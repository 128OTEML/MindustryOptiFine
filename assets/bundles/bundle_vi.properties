# bundle_vi.properties - Bản dịch tiếng Việt

mindustry-optifine = MindustryOptiFine

setting.shadow.name = Bóng 1
setting.shadow.description = Bật Bóng 1 (bóng thời gian thực với nguồn sáng).
setting.shadows_enabled.name = Bóng 2
setting.shadows_enabled.description = Bật Bóng 2 (bóng động với chu kỳ ngày/đêm).
setting.depthTex.name = Đổ bóng độ sâu
setting.depthTex.description = Sử dụng kết cấu độ sâu để mô phỏng chiều cao của công trình. Kết cấu độ sâu cho từng khối sẽ được tạo tự động nếu không tìm thấy trong $./mods/ShadowShader/$.
setting.precision.name = Độ chính xác (bước trên 1 ô)
setting.precision.description = Giá trị Độ chính xác là số bước trên mỗi chiều dài ô để dò tia sáng, giá trị cao hơn cho bóng chi tiết hơn.
setting.zoomPrec.name = Tự động điều chỉnh theo zoom
setting.zoomPrec.description = Độ chính xác của bóng tự động tăng/giảm khi camera phóng to/thu nhỏ. Phóng to để có bóng chi tiết, thu nhỏ để tiết kiệm hiệu năng.
setting.lightLowPass.name = Bán kính ánh sáng tối thiểu
setting.lightLowPass.description = Nguồn sáng có bán kính nhỏ hơn giá trị này sẽ không được sử dụng.
setting.maxLights.name = Số lượng ánh sáng tối đa
setting.maxLights.description = Số lượng nguồn sáng tối đa được sử dụng. Nguồn sáng được sắp xếp theo bán kính.
setting.debug.name = Gỡ lỗi
setting.debug.description = Gỡ lỗi (Kết cấu độ sâu)

setting.al-bloom-enabled.name = Bật Bloom
setting.al-bloom-enabled.description = Có thể xung đột với bloom mặc định, khuyến nghị tắt bloom mặc định.
setting.al-environment-enabled.name = Hiển thị Môi trường
setting.al-environment-enabled.description = Yêu cầu Khởi động lại.

setting.al-bloom-quality.name = Chất lượng Bloom
setting.al-bloom-intensity.name = Cường độ Bloom
setting.al-bloom-blur-amount.name = Lượng làm mờ
setting.al-bloom-flare-amount.name = Lượng ánh sáng lóa
setting.al-bloom-flare-length.name = Chiều dài ánh sáng lóa
setting.al-bloom-threshold.name = Ngưỡng Bloom
setting.al-bloom-saturation.name = Độ bão hòa Bloom
setting.al-bloom-flare-direction.name = Hướng ánh sáng lóa
setting.al-bloom-blur-size.name = Kích thước làm mờ

setting.al-bloom-blur-feedback.name = Phản hồi làm mờ
setting.al-bloom-blur-feedback.description = Mức độ làm mờ sáng hơn sau mỗi lần lặp, chỉ hoạt động khi Lượng làm mờ lớn hơn 1.

setting.al-bloom-flare-feedback.name = Phản hồi ánh sáng lóa
setting.al-bloom-flare-feedback.description = Mức độ ánh sáng lóa sáng hơn sau mỗi lần lặp, chỉ hoạt động khi Lượng ánh sáng lóa lớn hơn 1.

setting.al-bloom-diffuse-amount.name = Lượng khuếch tán làm mờ
setting.al-bloom-diffuse-amount.description = Lượng làm mờ thêm với kích thước tăng dần được thêm vào.

setting.al-bloom-diffuse-size.name = Kích thước khuếch tán làm mờ
setting.al-bloom-diffuse-feedback.name = Phản hồi khuếch tán làm mờ

setting.al-hide-lights.name = Tắt Ánh sáng
setting.al-hide-lights.description = Tắt Ánh sáng mặc định.

setting.edge-enabled.name = Bật Hiển thị Cạnh
setting.edge-enabled.description = Bật hiển thị kết cấu cạnh/kết nối tự động cho các khối môi trường. Tạo kết cấu cạnh dựa trên mặt nạ.

setting.connect-wall-enabled.name = Bật Kết nối Tường
setting.connect-wall-enabled.description = Bật hiển thị kết cấu kết nối cho tường. Thay thế kết cấu tường mặc định bằng kết cấu kết nối liền mạch.

setting.advanced-camera.name = Bật Camera Nâng cao
setting.advanced-camera.description = Cho phép camera xoay theo hướng xoay của đơn vị.
setting.camera-sensitivity.name = Độ nhạy Camera
setting.camera-sensitivity.description = Tốc độ camera xoay tương ứng với đơn vị.

setting.day_night_cycle.name = Chu kỳ Ngày/Đêm
setting.day_night_cycle.description = Bật chu kỳ ngày/đêm động cho Bóng 2.
setting.unit_shadows.name = Bóng Đơn vị
setting.unit_shadows.description = Bật bóng động cho đơn vị.
setting.graphics_quality.name = Chất lượng Đồ họa
setting.graphics_quality.description = Chất lượng hiển thị của bóng động (Thấp/Trung bình/Cao).
setting.shadow_length.name = Chiều dài Bóng
setting.shadow_length.description = Chiều dài của bóng động tính theo ô.
setting.prop_shadow_scale.name = Tỷ lệ Bóng Vật thể
setting.prop_shadow_scale.description = Hệ số tỷ lệ cho bóng vật thể. Đặt 0 để dùng hành vi mặc định.
setting.shadow_opacity_percent.name = Độ mờ Bóng
setting.shadow_opacity_percent.description = Độ mờ của bóng động.
setting.blur_radius.name = Bán kính làm mờ
setting.blur_radius.description = Bán kính làm mờ Gaussian cho viền bóng mềm.
setting.shadow_tint_percent.name = Màu sắc Bóng
setting.shadow_tint_percent.description = Cường độ màu của bóng.
setting.contact_shadow_percent.name = Bóng Tiếp xúc
setting.contact_shadow_percent.description = Cường độ bóng tiếp xúc tại chân của vật thể.
setting.dark_fade_percent.name = Mờ dần khi Tối
setting.dark_fade_percent.description = Mức độ bóng tan biến vào ban đêm.

