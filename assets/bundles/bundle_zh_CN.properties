mindustry-optifine = MindustryOptiFine

setting.shadow.name = 光影1
setting.shadow.description = 启用光影1（实时光源阴影）。
setting.shadows_enabled.name = 光影2
setting.shadows_enabled.description = 启用光影2（动态日/夜循环阴影）。
setting.depthTex.name = 深度贴图
setting.depthTex.description = 使用深度贴图表示建筑的高度细节。如果目录$./mods/ShadowShader/$下没有深度贴图，会自动分析方块材质生成。
setting.precision.name = 阴影精度（每格）
setting.precision.description = 精度是光线在每格长度中判定的步数，值越高阴影越精细。
setting.zoomPrec.name = 缩放自动加强精度
setting.zoomPrec.description = 阴影精度随着视角的缩放而自动调整。放大可以看清阴影细节，缩小可以节约性能。
setting.lightLowPass.name = 最小光源半径
setting.lightLowPass.description = 光源半径低于该值的不会用于渲染。
setting.maxLights.name = 最大光源数量
setting.maxLights.description = 最多有多少光源渲染。光源按照半径大小排优先级。
setting.debug.name = 调试
setting.debug.description = 调试(深度贴图)

setting.al-bloom-enabled.name = 启用光效
setting.al-bloom-enabled.description = 可能与原版光效冲突,推荐禁用原版光效
setting.al-environment-enabled.name = 环境渲染
setting.al-environment-enabled.description = 需要重启

setting.al-bloom-quality.name = 光效质量
setting.al-bloom-intensity.name = 光效强度
setting.al-bloom-blur-amount.name = 模糊强度
setting.al-bloom-flare-amount.name = 耀斑强度
setting.al-bloom-flare-length.name = 耀斑距离
setting.al-bloom-threshold.name = 光效阈值
setting.al-bloom-saturation.name = 光效饱和
setting.al-bloom-flare-direction.name = 耀斑方向
setting.al-bloom-blur-size.name = 模糊大小

setting.al-bloom-blur-feedback.name = 模糊反馈
setting.al-bloom-blur-feedback.description = 每次迭代时的模糊亮度,只有模糊强度大于1的时候才有效

setting.al-bloom-flare-feedback.name = 耀斑反馈
setting.al-bloom-flare-feedback.description = 每次迭代时的耀斑亮度,只有耀斑强度大于1的时候才有效

setting.al-bloom-diffuse-amount.name = 扩散模糊强度
setting.al-bloom-diffuse-amount.description = 在顶部添加的额外模糊次数，模糊尺寸会逐渐增加。

setting.al-bloom-diffuse-size.name = 扩散模糊尺寸
setting.al-bloom-diffuse-feedback.name = 扩散模糊反馈

setting.al-hide-lights.name = 关闭光照
setting.al-hide-lights.description = 关闭原版环境光照

setting.edge-enabled.name = 启用边缘渲染
setting.edge-enabled.description = 为环境方块启用自动边缘/连接纹理渲染。基于蒙版贴图生成边缘纹理。

setting.connect-wall-enabled.name = 启用连接墙体
setting.connect-wall-enabled.description = 为墙体启用连接纹理渲染。用无缝连接纹理替换原版墙体纹理。

setting.advanced-camera.name = 启用高级相机
setting.advanced-camera.description = 让相机跟随单位的旋转而旋转。
setting.camera-sensitivity.name = 相机灵敏度
setting.camera-sensitivity.description = 相机相对于单位旋转的速度。

setting.day_night_cycle.name = 日/夜循环
setting.day_night_cycle.description = 为光影2启用动态日/夜循环。
setting.unit_shadows.name = 单位阴影
setting.unit_shadows.description = 为单位启用动态阴影。
setting.graphics_quality.name = 图形质量
setting.graphics_quality.description = 动态阴影的渲染质量（低/中/高）。
setting.shadow_length.name = 阴影长度
setting.shadow_length.description = 动态阴影的长度（以格为单位）。
setting.prop_shadow_scale.name = 道具阴影缩放
setting.prop_shadow_scale.description = 道具阴影的缩放倍率。设为0启用原版行为。
setting.shadow_opacity_percent.name = 阴影不透明度
setting.shadow_opacity_percent.description = 动态阴影的不透明度。
setting.blur_radius.name = 模糊半径
setting.blur_radius.description = 软阴影边缘的高斯模糊半径。
setting.shadow_tint_percent.name = 阴影色调
setting.shadow_tint_percent.description = 阴影的颜色强度。
setting.contact_shadow_percent.name = 接触阴影
setting.contact_shadow_percent.description = 物体底部接触阴影的强度。
setting.dark_fade_percent.name = 夜间淡化
setting.dark_fade_percent.description = 阴影在夜间淡化的程度。
