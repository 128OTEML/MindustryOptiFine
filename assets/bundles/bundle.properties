mindustry-optifine = MindustryOptiFine

setting.shadow.name = Shadow 1
setting.shadow.description = Enable Shadow 1 (real-time shadow with light sources).
setting.shadows_enabled.name = Shadow 2
setting.shadows_enabled.description = Enable Shadow 2 (dynamic shadow with day/night cycle).
setting.depthTex.name = Depth Shadowing
setting.depthTex.description = Using depth textures to simulate the height of buildings. Depth texture for each block texture is auto-generated if no found in $./mods/ShadowShader/$.
setting.precision.name = Precision(step per 1 tile)
setting.precision.description = The value of Precision is the steps per tile length for light trace, higher value for detailed shadow.
setting.zoomPrec.name = Zoom Auto-Prec
setting.zoomPrec.description = Shadow precision automatically increase and decrease as the camera zooms. Zooming up for detailed shadow, zooming down to save performance.
setting.lightLowPass.name = Minimum of light radius
setting.lightLowPass.description = Lights with radius lower than the value will not used.
setting.maxLights.name = Maximum of light count
setting.maxLights.description = Max count of lights used. Lights are sorted by radius.
setting.debug.name = Debug
setting.debug.description = Debug(Depth Texture)

setting.al-bloom-enabled.name = Enable Bloom
setting.al-bloom-enabled.description = May conflict with vanilla bloom, disabling it is recommended.
setting.al-environment-enabled.name = Render Environment
setting.al-environment-enabled.description = Requires Restart.

setting.al-bloom-quality.name = Bloom Quality
setting.al-bloom-intensity.name = Bloom Intensity
setting.al-bloom-blur-amount.name = Blur Amount
setting.al-bloom-flare-amount.name = Flare Amount
setting.al-bloom-flare-length.name = Flare Length
setting.al-bloom-threshold.name = Bloom Threshold
setting.al-bloom-saturation.name = Bloom Saturation
setting.al-bloom-flare-direction.name = Flare Direction
setting.al-bloom-blur-size.name = Blur Size

setting.al-bloom-blur-feedback.name = Blur Feedback
setting.al-bloom-blur-feedback.description = How much the blur brighten each iteration, only works when Blur Amount is greater than 1.

setting.al-bloom-flare-feedback.name = Flare Feedback
setting.al-bloom-flare-feedback.description = How much the flare brighten each iteration, only works when Flare Amount is greater than 1.

setting.al-bloom-diffuse-amount.name = Blur Diffuse Amount
setting.al-bloom-diffuse-amount.description = Amount of extra blur with increasing sizes added on top.

setting.al-bloom-diffuse-size.name = Blur Diffuse Size
setting.al-bloom-diffuse-feedback.name = Blur Diffuse Feedback

setting.al-hide-lights.name = Disable Lights
setting.al-hide-lights.description = Disables Vanilla Lights.

setting.edge-enabled.name = Enable Edge Rendering
setting.edge-enabled.description = Enables automatic edge/connection texture rendering for environment blocks. Generates edge textures based on the mask.

setting.connect-wall-enabled.name = Enable Connect Wall
setting.connect-wall-enabled.description = Enables connectable texture rendering for walls. Replaces vanilla wall textures with seamless connect textures.

setting.advanced-camera.name = Enable Advanced Camera
setting.advanced-camera.description = Makes the camera rotate with the unit's rotation.
setting.camera-sensitivity.name = Camera Sensitivity
setting.camera-sensitivity.description = How fast the camera rotates relative to the unit.

setting.day_night_cycle.name = Day/Night Cycle
setting.day_night_cycle.description = Enable dynamic day/night cycle for Shadow 2.
setting.unit_shadows.name = Unit Shadows
setting.unit_shadows.description = Enable dynamic shadows for units.
setting.graphics_quality.name = Graphics Quality
setting.graphics_quality.description = Render quality of dynamic shadows (Low/Medium/High).
setting.shadow_length.name = Shadow Length
setting.shadow_length.description = Length of dynamic shadows in tiles.
setting.prop_shadow_scale.name = Prop Shadow Scale
setting.prop_shadow_scale.description = Scale multiplier for prop shadows. Set to 0 for vanilla behavior.
setting.shadow_opacity_percent.name = Shadow Opacity
setting.shadow_opacity_percent.description = Opacity of dynamic shadows.
setting.blur_radius.name = Blur Radius
setting.blur_radius.description = Gaussian blur radius for soft shadow edges.
setting.shadow_tint_percent.name = Shadow Tint
setting.shadow_tint_percent.description = Color intensity of shadows.
setting.contact_shadow_percent.name = Contact Shadow
setting.contact_shadow_percent.description = Strength of the contact shadow at the base of objects.
setting.dark_fade_percent.name = Dark Fade
setting.dark_fade_percent.description = How much shadows dissolve at night.
